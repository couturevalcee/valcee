<svg width="400" height="70" viewBox="0 0 400 70" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Valcee Couture">
  <defs>
    <!-- Gold painterly gradient centered on brand gold -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7efe6" />
      <stop offset="25%" stop-color="#ead6b6" />
      <stop offset="50%" stop-color="#c1936b" />
      <stop offset="75%" stop-color="#b07a43" />
      <stop offset="100%" stop-color="#f7efe6" />
    </linearGradient>

    <!-- Subtle noise texture for a painterly feel -->
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" result="mono" />
      <feBlend in="SourceGraphic" in2="mono" mode="overlay" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Painterly logo: serif wordmark + small sans submark -->
  <g filter="url(#grain)">
    <text x="0" y="48" font-family="Fraunces, Georgia, serif" font-weight="700" font-size="40" fill="url(#goldGradient)">Valcee</text>
    <text x="240" y="48" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="20" fill="url(#goldGradient)">Couture</text>
  </g>
</svg>
<svg width="400" height="70" viewBox="0 0 400 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0e6d2" />
      <stop offset="25%" stop-color="#e8d5ba" />
      <stop offset="50%" stop-color="#c1936b" />
      <stop offset="75%" stop-color="#a67c52" />
      <stop offset="100%" stop-color="#f0e6d2" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" />
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" result="blend" />
    </filter>
  </defs>
  <text x="10" y="52" font-family="Georgia, serif" font-size="48" font-weight="600" fill="url(#goldGradient)" filter="url(#grain)">Valcee</text>
  <text x="230" y="52" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="url(#goldGradient)" filter="url(#grain)">Couture</text>
</svg>
</svg></content>
