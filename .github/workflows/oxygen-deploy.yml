name: Oxygen Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Hydrogen storefront
        run: npm run build

      - name: Deploy to Oxygen
        uses: shopify/oxygen-deploy-action@v1
        with:
          store-id: ${{ secrets.SHOPIFY_STORE_ID }}
          oxygen-deploy-token: ${{ secrets.SHOPIFY_OXYGEN_DEPLOY_TOKEN }}
          path: dist
